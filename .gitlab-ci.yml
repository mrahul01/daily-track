stages:
  - test
  - upload

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

defectdojo_upload:
  stage: upload
  image: curlimages/curl:latest
  script:
    # 1. Upload SAST (if the file exists)
    - |
      if [ -f gl-sast-report.json ]; then
        curl -X POST "${DD_URL}/api/v2/import-scan/" \
        -H "Authorization: Token ${DD_API_TOKEN}" \
        -F "scan_type=GitLab SAST Report" \
        -F "engagement=3" \
        -F "file=@gl-sast-report.json"
      fi
    
    # 2. Upload Dependency Scanning (if the file exists)
    - |
      if [ -f gl-dependency-scanning-report.json ]; then
        curl -X POST "${DD_URL}/api/v2/import-scan/" \
        -H "Authorization: Token ${DD_API_TOKEN}" \
        -F "scan_type=GitLab Dependency Scanning Report" \
        -F "engagement=3" \
        -F "file=@gl-dependency-scanning-report.json"
      fi
    
    # 3. Upload Secret Detection (if the file exists)
    - |
      if [ -f gl-secret-detection-report.json ]; then
        curl -X POST "${DD_URL}/api/v2/import-scan/" \
        -H "Authorization: Token ${DD_API_TOKEN}" \
        -F "scan_type=GitLab Secret Detection Report" \
        -F "engagement=3" \
        -F "file=@gl-secret-detection-report.json"
      fi
  # We remove the specific 'dependencies' list so it doesn't error out 
  # if a job name changes. 'artifacts: true' is the default.
  when: always
